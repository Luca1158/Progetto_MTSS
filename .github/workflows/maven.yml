name: Java CI with Maven

#La pipeline si attiva ad ogni push e Pull Request
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4
    
    - name: Configurazione JDK 1.8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    # Fase di compilazione (eseguita nella fase di compile)
    - name: 1. Compilazione
      run: mvn -B compile

    # Esecuzione test e generazione report JaCoCo (fase di test)
    - name: 2. Esecuzione Test e Coverage
      run: mvn -B test jacoco:report

    # Analisi statica del codice (eseguita nella fase di package)
    - name: 3. Analisi Statica (Checkstyle)
      run: mvn -B checkstyle:check

    # Invio dei dati a Coveralls per il monitoraggio del coverage
    - name: 4. Report Coveralls
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      run: mvn -B coveralls:report
